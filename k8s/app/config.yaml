apiVersion: v1
kind: ConfigMap
metadata:
  name: test-app-config
  namespace: appspace
data:
  PORT: "8080"
  LOG_LEVEL: info
  ENABLE_HTTP_LOGGING: "true"
  METRICS_ENABLED: "true"
  CORS_ALLOWED_ORIGINS: "*"
  DB_HOST: postgres
  DB_PORT: "5432"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  ACCESS_TOKEN_EXPIRY_MIN: "15"
  REFRESH_TOKEN_EXPIRY_HOURS: "168"
