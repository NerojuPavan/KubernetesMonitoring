apiVersion: v1
kind: Namespace
metadata:
  name: appspace
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: appspace-quota
  namespace: appspace
spec:
  hard:
    pods: "6"
    services: "5"
    secrets: "5"
    configmaps: "5"
    persistentvolumeclaims: "2"
    requests.cpu: "1"
    requests.memory: 1536Mi
    limits.cpu: "2"
    limits.memory: 2Gi
